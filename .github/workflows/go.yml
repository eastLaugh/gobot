name: Go

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go test ./...

  build-linux:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build linux amd64
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o tfbot .

      - uses: actions/upload-artifact@v4
        with:
          name: tfbot-linux-amd64
          path: tfbot

  deploy:
    runs-on: ubuntu-latest
    needs: build-linux
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      SSH_HOST: ${{ secrets.ALIYUN_HOST }}
      SSH_USER: ${{ secrets.ALIYUN_USER }}
      SSH_PORT: ${{ secrets.ALIYUN_PORT }}
      SSH_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: tfbot-linux-amd64

      - name: Install SSH key
        run: |
          test -n "$SSH_HOST"
          test -n "$SSH_USER"
          test -n "$SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy binary
        run: |
          PORT="${SSH_PORT:-22}"
          scp -P "$PORT" tfbot "$SSH_USER@$SSH_HOST:/root/tfbot/tfbot.new"
          ssh -p "$PORT" "$SSH_USER@$SSH_HOST" '
            set -e
            cd /root/tfbot
            chmod +x tfbot.new
            if systemctl list-unit-files gobot.service >/dev/null 2>&1; then
              systemctl stop gobot
              mv -f tfbot.new tfbot
              systemctl start gobot
            else
              mv -f tfbot.new tfbot
              echo "gobot.service 不存在，只替换二进制，没有自动重启。"
            fi
          '

  release:
    runs-on: ubuntu-latest
    needs: build-linux
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: tfbot-linux-amd64

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mv tfbot tfbot-linux-amd64
          gh release create "${GITHUB_REF_NAME}" tfbot-linux-amd64 --generate-notes
