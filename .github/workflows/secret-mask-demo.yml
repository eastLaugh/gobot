name: Secret Mask Demo

on:
  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Show hardcoded fake secret behavior
        run: |
          FAKE_SECRET="FAKE_SECRET_DO_NOT_USE_123456"
          echo "hardcoded fake secret before mask: $FAKE_SECRET"
          echo "::add-mask::$FAKE_SECRET"
          echo "hardcoded fake secret after mask: $FAKE_SECRET"
